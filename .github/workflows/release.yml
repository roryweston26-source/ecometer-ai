name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./extension/manifest.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build zip
        run: |
          cd extension
          zip -r ../ecometer-ai-v${{ steps.version.outputs.version }}.zip . \
            --exclude "*.DS_Store" \
            --exclude "*/.gitkeep"
          echo "Built ecometer-ai-v${{ steps.version.outputs.version }}.zip"
          ls -lh ../ecometer-ai-v${{ steps.version.outputs.version }}.zip

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q "${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EcoMeter AI ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ecometer-ai-v${{ steps.version.outputs.version }}.zip
          body: |
            ## EcoMeter AI ${{ steps.version.outputs.tag }}

            ### Install from source
            1. Download `ecometer-ai-v${{ steps.version.outputs.version }}.zip` below
            2. Unzip it
            3. Go to `chrome://extensions`, enable Developer mode
            4. Click **Load unpacked** and select the unzipped folder

            ---
            *Built automatically from [`main`](https://github.com/${{ github.repository }}/tree/main)*

      - name: Upload zip as artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ecometer-ai-v${{ steps.version.outputs.version }}
          path: ecometer-ai-v${{ steps.version.outputs.version }}.zip
          retention-days: 30

      # ── Chrome Web Store upload ───────────────────────────────────────────
      # Uploads the new zip to the store as a DRAFT — you still click
      # "Publish" manually in the Chrome Developer Dashboard.
      # Requires three secrets set in GitHub → Settings → Secrets:
      #   CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN
      # See SETUP.md for how to get these values.
      - name: Check store secrets exist
        id: secrets_check
        run: |
          if [ -n "${{ secrets.CWS_CLIENT_ID }}" ] && \
             [ -n "${{ secrets.CWS_CLIENT_SECRET }}" ] && \
             [ -n "${{ secrets.CWS_REFRESH_TOKEN }}" ] && \
             [ -n "${{ secrets.CWS_EXTENSION_ID }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⚠ Chrome Web Store secrets not configured — skipping store upload."
            echo "See SETUP.md for instructions."
          fi

      - name: Get store access token
        if: steps.secrets_check.outputs.ready == 'true'
        id: access_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CWS_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CWS_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CWS_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          TOKEN=$(echo "$RESPONSE" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).access_token))")
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "undefined" ]; then
            echo "✗ Failed to get access token. Check your CWS secrets."
            echo "$RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "✓ Got access token"

      - name: Upload to Chrome Web Store (draft)
        if: steps.secrets_check.outputs.ready == 'true'
        run: |
          EXTENSION_ID="${{ secrets.CWS_EXTENSION_ID }}"
          ZIP="ecometer-ai-v${{ steps.version.outputs.version }}.zip"
          TOKEN="${{ steps.access_token.outputs.token }}"

          echo "Uploading $ZIP to Chrome Web Store..."

          RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP")

          STATUS=$(echo "$RESPONSE" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).uploadState || JSON.parse(d).error?.message || 'unknown'))")

          echo "Upload status: $STATUS"

          if [ "$STATUS" = "SUCCESS" ]; then
            echo ""
            echo "✓ Uploaded successfully as a DRAFT."
            echo ""
            echo "To publish: go to the Chrome Developer Dashboard and click Publish."
            echo "https://chrome.google.com/webstore/devconsole"
          elif [ "$STATUS" = "IN_PROGRESS" ]; then
            echo "✓ Upload in progress — check the Developer Dashboard."
          else
            echo "✗ Upload failed: $STATUS"
            echo "Full response: $RESPONSE"
            exit 1
          fi
